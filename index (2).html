<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f7c948;
    --accent3: #4df0c0;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --danger: #f76a6a;
    --gradient: linear-gradient(135deg, #7c6af7, #4df0c0);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
  h1,h2,h3,h4 { font-family:'Syne',sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--surface); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Layout */
  .app { display:flex; min-height:100vh; }
  .sidebar {
    width:240px; min-height:100vh; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    padding:24px 16px; position:fixed; left:0; top:0; bottom:0; z-index:10;
  }
  .main { margin-left:240px; flex:1; padding:32px; min-height:100vh; }

  /* Logo */
  .logo { display:flex; align-items:center; gap:10px; margin-bottom:36px; padding:0 8px; }
  .logo-icon {
    width:36px; height:36px; border-radius:10px;
    background:var(--gradient); display:flex; align-items:center; justify-content:center;
    font-size:18px; font-family:'Syne',sans-serif; font-weight:800; color:#fff;
    flex-shrink:0;
  }
  .logo-text { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; line-height:1.2; }
  .logo-text span { color:var(--accent); }

  /* Nav */
  .nav { display:flex; flex-direction:column; gap:4px; flex:1; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border-radius:10px; cursor:pointer; transition:all 0.2s; font-size:14px;
    color:var(--muted); font-weight:500; border:none; background:none; text-align:left;
    width:100%;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:rgba(124,106,247,0.15); color:var(--accent); }
  .nav-item .icon { font-size:18px; width:22px; text-align:center; }
  .nav-badge {
    margin-left:auto; background:var(--accent); color:#fff;
    font-size:10px; font-weight:700; padding:2px 6px; border-radius:20px;
  }

  /* User footer */
  .sidebar-user {
    display:flex; align-items:center; gap:10px; padding:12px;
    background:var(--surface2); border-radius:12px; cursor:pointer;
  }
  .avatar {
    width:36px; height:36px; border-radius:50%; background:var(--gradient);
    display:flex; align-items:center; justify-content:center; font-weight:700;
    font-size:13px; color:#fff; flex-shrink:0; font-family:'Syne',sans-serif;
  }
  .avatar.sm { width:28px; height:28px; font-size:11px; }
  .avatar.lg { width:52px; height:52px; font-size:18px; }
  .avatar.xl { width:72px; height:72px; font-size:24px; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-role { font-size:11px; color:var(--muted); }

  /* Buttons */
  .btn {
    padding:10px 20px; border-radius:10px; font-weight:600; font-size:14px;
    cursor:pointer; transition:all 0.2s; border:none; font-family:'DM Sans',sans-serif;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#6a58e8; transform:translateY(-1px); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--border); }
  .btn-ghost { background:transparent; color:var(--muted); }
  .btn-ghost:hover { color:var(--text); background:var(--surface2); }
  .btn-sm { padding:6px 14px; font-size:12px; }
  .btn-accent2 { background:var(--accent2); color:#000; }
  .btn-danger { background:rgba(247,106,106,0.15); color:var(--danger); border:1px solid rgba(247,106,106,0.3); }

  /* Cards */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px;
  }
  .card-hover:hover { border-color:var(--accent); transform:translateY(-2px); transition:all 0.2s; }

  /* Tags */
  .tag {
    display:inline-flex; align-items:center; gap:4px;
    padding:4px 10px; border-radius:20px; font-size:12px; font-weight:500;
  }
  .tag-purple { background:rgba(124,106,247,0.15); color:var(--accent); border:1px solid rgba(124,106,247,0.3); }
  .tag-teal { background:rgba(77,240,192,0.1); color:var(--accent3); border:1px solid rgba(77,240,192,0.25); }
  .tag-yellow { background:rgba(247,201,72,0.1); color:var(--accent2); border:1px solid rgba(247,201,72,0.25); }
  .tag-red { background:rgba(247,106,106,0.1); color:var(--danger); border:1px solid rgba(247,106,106,0.25); }
  .tag-gray { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

  /* Input */
  .input {
    width:100%; padding:11px 14px; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; transition:border 0.2s;
  }
  .input:focus { border-color:var(--accent); }
  .input::placeholder { color:var(--muted); }
  textarea.input { resize:vertical; min-height:80px; line-height:1.6; }

  .input-group { display:flex; flex-direction:column; gap:6px; }
  .label { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.03em; }

  /* Page headers */
  .page-header { margin-bottom:28px; }
  .page-title { font-size:28px; font-weight:800; margin-bottom:6px; }
  .page-sub { color:var(--muted); font-size:15px; }

  /* Grid */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }

  /* Onboarding */
  .onboarding-wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); padding:40px 20px;
  }
  .onboarding-card {
    width:100%; max-width:620px; background:var(--surface);
    border:1px solid var(--border); border-radius:24px; padding:40px;
  }
  .step-indicator { display:flex; gap:8px; margin-bottom:32px; }
  .step-dot {
    height:4px; border-radius:2px; transition:all 0.3s; flex:1;
  }
  .step-dot.done { background:var(--accent); }
  .step-dot.active { background:var(--accent3); }
  .step-dot.pending { background:var(--border); }

  .onboarding-title { font-size:22px; font-weight:800; margin-bottom:8px; }
  .onboarding-sub { color:var(--muted); font-size:14px; margin-bottom:28px; }

  .ikigai-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .ikigai-card {
    padding:16px; border-radius:12px; border:1px solid var(--border);
    background:var(--surface2);
  }
  .ikigai-icon { font-size:24px; margin-bottom:8px; }
  .ikigai-label { font-size:11px; font-weight:700; letter-spacing:0.06em; color:var(--muted); margin-bottom:6px; }

  .skills-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .skill-input-row { display:flex; gap:8px; }

  /* Match cards */
  .match-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:20px; transition:all 0.2s; cursor:pointer;
  }
  .match-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .match-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:14px; }
  .match-info { flex:1; }
  .match-name { font-weight:700; font-size:16px; margin-bottom:3px; font-family:'Syne',sans-serif; }
  .match-role { font-size:12px; color:var(--muted); }
  .match-score {
    width:48px; height:48px; border-radius:12px; background:rgba(124,106,247,0.15);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    flex-shrink:0;
  }
  .match-score-num { font-size:16px; font-weight:800; color:var(--accent); font-family:'Syne',sans-serif; line-height:1; }
  .match-score-label { font-size:9px; color:var(--muted); }
  .match-ai-box {
    background:rgba(77,240,192,0.05); border:1px solid rgba(77,240,192,0.15);
    border-radius:10px; padding:12px; margin-bottom:12px;
    font-size:13px; color:#c0f0e8; line-height:1.6;
  }
  .match-ai-label { font-size:10px; font-weight:700; color:var(--accent3); letter-spacing:0.08em; margin-bottom:6px; }
  .match-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .match-actions { display:flex; gap:8px; }

  /* Search bar */
  .search-wrap { position:relative; margin-bottom:24px; }
  .search-input {
    width:100%; padding:14px 20px 14px 48px; background:var(--surface);
    border:1px solid var(--border); border-radius:14px; color:var(--text);
    font-size:15px; font-family:'DM Sans',sans-serif; outline:none; transition:border 0.2s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }
  .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:18px; color:var(--muted); }
  .search-btn {
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:var(--accent); color:#fff; border:none; padding:8px 16px;
    border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
    font-family:'DM Sans',sans-serif; transition:all 0.2s;
  }
  .search-btn:hover { background:#6a58e8; }
  .search-btn:disabled { background:var(--border); cursor:not-allowed; }

  /* Filters */
  .filter-row { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .filter-btn {
    padding:7px 16px; border-radius:20px; font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.2s; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); font-family:'DM Sans',sans-serif;
  }
  .filter-btn.active { background:rgba(124,106,247,0.15); color:var(--accent); border-color:rgba(124,106,247,0.4); }
  .filter-btn:hover:not(.active) { background:var(--surface2); color:var(--text); }

  /* Stats */
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px;
  }
  .stat-num { font-size:32px; font-weight:800; font-family:'Syne',sans-serif; }
  .stat-label { font-size:13px; color:var(--muted); margin-top:4px; }

  /* Messages */
  .msg-layout { display:grid; grid-template-columns:280px 1fr; gap:0; height:calc(100vh - 100px); background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  .msg-list { border-right:1px solid var(--border); overflow-y:auto; }
  .msg-list-header { padding:16px 20px; border-bottom:1px solid var(--border); font-weight:700; font-size:15px; font-family:'Syne',sans-serif; }
  .msg-item { display:flex; align-items:center; gap:12px; padding:14px 20px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid rgba(255,255,255,0.04); }
  .msg-item:hover { background:var(--surface2); }
  .msg-item.active { background:rgba(124,106,247,0.1); }
  .msg-item-name { font-weight:600; font-size:14px; }
  .msg-item-preview { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .msg-unread { width:8px; height:8px; border-radius:50%; background:var(--accent); margin-left:auto; flex-shrink:0; }
  .chat-area { display:flex; flex-direction:column; }
  .chat-header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .chat-messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }
  .bubble {
    max-width:68%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.5;
  }
  .bubble.me { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .bubble.them { align-self:flex-start; background:var(--surface2); color:var(--text); border-bottom-left-radius:4px; }
  .bubble-time { font-size:10px; color:rgba(255,255,255,0.5); margin-top:3px; text-align:right; }
  .chat-input-row { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; }
  .chat-input {
    flex:1; padding:10px 14px; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; transition:border 0.2s;
  }
  .chat-input:focus { border-color:var(--accent); }

  /* Loading spinner */
  .spinner {
    width:20px; height:20px; border:2px solid rgba(124,106,247,0.3);
    border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite;
    display:inline-block;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Pulse animation */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .pulsing { animation:pulse 1.5s infinite; }

  /* Fade in */
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation:fadeUp 0.3s ease forwards; }

  /* Profile page */
  .profile-hero {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:32px; margin-bottom:20px; display:flex; align-items:flex-start; gap:24px;
  }
  .profile-details { flex:1; }
  .profile-name { font-size:26px; font-weight:800; margin-bottom:4px; }
  .profile-tagline { color:var(--muted); margin-bottom:14px; font-size:15px; }
  .profile-links { display:flex; gap:10px; flex-wrap:wrap; }
  .profile-link {
    display:flex; align-items:center; gap:6px; padding:6px 12px;
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    font-size:12px; color:var(--muted); text-decoration:none; cursor:pointer;
    transition:all 0.15s;
  }
  .profile-link:hover { color:var(--accent); border-color:var(--accent); }

  .ikigai-display { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .ikigai-display-card {
    padding:16px; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px;
  }
  .ikigai-display-label { font-size:10px; font-weight:700; letter-spacing:0.07em; color:var(--accent3); margin-bottom:8px; }
  .ikigai-display-text { font-size:14px; line-height:1.6; color:var(--text); }

  /* Empty state */
  .empty-state { text-align:center; padding:60px 20px; }
  .empty-icon { font-size:48px; margin-bottom:14px; }
  .empty-title { font-size:18px; font-weight:700; margin-bottom:8px; font-family:'Syne',sans-serif; }
  .empty-sub { color:var(--muted); font-size:14px; }

  /* Glow effects */
  .glow-accent { box-shadow:0 0 20px rgba(124,106,247,0.2); }
  .border-gradient { border-image: linear-gradient(135deg, #7c6af7, #4df0c0) 1; }

  /* API key banner */
  .api-banner {
    background:rgba(247,201,72,0.1); border:1px solid rgba(247,201,72,0.3);
    border-radius:12px; padding:14px 18px; margin-bottom:20px;
    display:flex; align-items:center; gap:12px; font-size:13px;
  }

  /* Divider */
  .divider { height:1px; background:var(--border); margin:20px 0; }

  /* Notification dot */
  .dot-online { width:8px; height:8px; border-radius:50%; background:#4df0c0; }

  @media(max-width:768px) {
    .sidebar { display:none; }
    .main { margin-left:0; padding:20px; }
    .grid-2, .grid-3 { grid-template-columns:1fr; }
    .ikigai-grid { grid-template-columns:1fr; }
    .msg-layout { grid-template-columns:1fr; }
  }
</style>
</head>

function App() {

  const [currentUser, setCurrentUser] = useState(null);
  const [profiles, setProfiles] = useState(SEED_PROFILES);

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage} user={currentUser} unreadCount={unreadCount} />
      <main className="main">
        {page === "discover" && <Discover profiles={profiles} currentUser={currentUser} connections={connections} setConnections={setConnections} apiKey={apiKey} setApiKey={setApiKey} />}
        {page === "matches" && <Matches profiles={profiles} currentUser={currentUser} connections={connections} setConnections={setConnections} apiKey={apiKey} setApiKey={setApiKey} />}
        {page === "messages" && <Messages connections={connections} profiles={profiles} messages={messages} setMessages={setMessages} />}
        {page === "profile" && <Profile user={currentUser} setUser={(u) => { setCurrentUser(u); }} />}

}

// ─── Onboarding ───────────────────────────────────────────────────────────────
function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    name:"", role:"Founder", location:"",
    ikigai:{ love:"", good:"", paid:"", need:"" },
    skills:[], availability:"Full-time", workingStyle:"Async-first",
    github:"", linkedin:"", portfolio:"",
    intent:"cofounder", visibility:"public"
  });
  const [skillInput, setSkillInput] = useState("");

  const steps = ["Welcome","About You","Your Ikigai","Skills & Style","Links"];

  const update = (field, val) => setData(d => ({...d, [field]:val}));
  const updateIkigai = (field, val) => setData(d => ({...d, ikigai:{...d.ikigai, [field]:val}}));

  const addSkill = () => {
    const s = skillInput.trim();
    if(s && !data.skills.includes(s)) {
      setData(d => ({...d, skills:[...d.skills, s]}));
      setSkillInput("");
    }
  };
  const removeSkill = (s) => setData(d => ({...d, skills:d.skills.filter(x=>x!==s)}));

  const canProceed = () => {
    if(step===1) return data.name.trim() && data.location.trim();
    if(step===2) return data.ikigai.love.trim() && data.ikigai.good.trim();
    return true;
  };

  const handleSubmit = () => {
    const newUser = {
      ...data, id:"me",
      ikigaiStatement: `I use my passion for ${data.ikigai.love.substring(0,40)}... to make a difference.`
    };
    onComplete(newUser);
  };

  return (
    <div className="onboarding-wrap">
      <div className="onboarding-card fade-up">
        {/* Step indicator */}
        <div className="step-indicator">
          {steps.map((_, i) => (
            <div key={i} className={`step-dot ${i<step?"done":i===step?"active":"pending"}`}></div>
          ))}
        </div>

        {step === 0 && (
          <div>
            <div style={{fontSize:48,marginBottom:16}}>🌐</div>
            <div className="onboarding-title">Welcome to SuperNetworkAI</div>
            <div className="onboarding-sub">Find your perfect cofounder, teammate, or client using AI-powered Ikigai matching. This takes about 3 minutes.</div>
            <div style={{background:"var(--surface2)",borderRadius:12,padding:16,marginBottom:24,border:"1px solid var(--border)"}}>
              <div style={{fontSize:13,color:"var(--muted)",marginBottom:8,fontWeight:600}}>WHAT IS IKIGAI?</div>
              <div style={{fontSize:13,lineHeight:1.7,color:"var(--text)"}}>
                Ikigai (生き甲斐) is a Japanese concept meaning <em>"reason for being"</em> — the intersection of what you love, what you're good at, what the world needs, and what you can be paid for. We use it to find truly aligned matches. 🎯
              </div>
            </div>
            <button className="btn btn-primary" style={{width:"100%"}} onClick={() => setStep(1)}>Get Started →</button>
          </div>
        )}

        {step === 1 && (
          <div className="fade-up">
            <div className="onboarding-title">Tell us about yourself</div>
            <div className="onboarding-sub">Basic info to get you started</div>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div className="input-group">
                <label className="label">FULL NAME</label>
                <input className="input" placeholder="e.g. Alex Johnson" value={data.name} onChange={e=>update("name",e.target.value)}/>
              </div>
              <div className="grid-2">
                <div className="input-group">
                  <label className="label">I AM A...</label>
                  <select className="input" value={data.role} onChange={e=>update("role",e.target.value)}>
                    {["Founder","Engineer","Designer","Marketer","Researcher","Investor","Product Manager","Other"].map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
                <div className="input-group">
                  <label className="label">LOOKING TO...</label>
                  <select className="input" value={data.intent} onChange={e=>update("intent",e.target.value)}>
                    <option value="cofounder">Find a Cofounder</option>
                    <option value="teammate">Find Teammates</option>
                    <option value="client">Find Clients</option>
                  </select>
                </div>
              </div>
              <div className="input-group">
                <label className="label">LOCATION</label>
                <input className="input" placeholder="e.g. Bangalore, India" value={data.location} onChange={e=>update("location",e.target.value)}/>
              </div>
            </div>
          </div>
        )}

        {step === 2 && (
          <div className="fade-up">
            <div className="onboarding-title">Your Ikigai ✨</div>
            <div className="onboarding-sub">Be specific — this is how our AI finds your best matches</div>
            <div className="ikigai-grid">
              {[
                {key:"love", icon:"❤️", color:"#f76a6a", label:"WHAT I LOVE", placeholder:"What brings you energy? What makes you lose track of time?"},
                {key:"good", icon:"⭐", color:"var(--accent2)", label:"WHAT I'M GOOD AT", placeholder:"Skills, talents, things people ask you for help with..."},
                {key:"paid", icon:"💰", color:"var(--accent3)", label:"WHAT I CAN BE PAID FOR", placeholder:"Your monetizable skills, current/past work, expertise..."},
                {key:"need", icon:"🌍", color:"var(--accent)", label:"WHAT THE WORLD NEEDS", placeholder:"Problems you want to solve, changes you want to see..."},
              ].map(q => (
                <div key={q.key} className="ikigai-card" style={{borderColor:`${q.color}30`}}>
                  <div className="ikigai-icon">{q.icon}</div>
                  <div className="ikigai-label" style={{color:q.color}}>{q.label}</div>
                  <textarea className="input" style={{minHeight:70,fontSize:13}} placeholder={q.placeholder}
                    value={data.ikigai[q.key]} onChange={e=>updateIkigai(q.key,e.target.value)}/>
                </div>
              ))}
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="fade-up">
            <div className="onboarding-title">Skills & Working Style</div>
            <div className="onboarding-sub">Help us find people you'll actually work well with</div>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div className="input-group">
                <label className="label">YOUR SKILLS (press Enter to add)</label>
                <div className="skill-input-row">
                  <input className="input" placeholder="e.g. React, Fundraising, UX Design..." value={skillInput}
                    onChange={e=>setSkillInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addSkill()}/>
                  <button className="btn btn-secondary" onClick={addSkill}>Add</button>
                </div>
                {data.skills.length > 0 && (
                  <div className="skills-wrap">
                    {data.skills.map(s => (
                      <span key={s} className="tag tag-purple" onClick={()=>removeSkill(s)} style={{cursor:"pointer"}}>
                        {s} ✕
                      </span>
                    ))}
                  </div>
                )}
              </div>
              <div className="grid-2">
                <div className="input-group">
                  <label className="label">AVAILABILITY</label>
                  <select className="input" value={data.availability} onChange={e=>update("availability",e.target.value)}>
                    {["Full-time","Part-time","Weekends only","Flexible","Not available"].map(a=><option key={a}>{a}</option>)}
                  </select>
                </div>
                <div className="input-group">
                  <label className="label">WORKING STYLE</label>
                  <select className="input" value={data.workingStyle} onChange={e=>update("workingStyle",e.target.value)}>
                    {["Async-first","Real-time collaboration","Deep work blocks","Flexible","Collaborative sprints"].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </div>
        )}

        {step === 4 && (
          <div className="fade-up">
            <div className="onboarding-title">Connect Your Profiles</div>
            <div className="onboarding-sub">Optional — helps others see your work and verify your background</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {[
                {field:"github", icon:"🐙", label:"GITHUB", placeholder:"github.com/username"},
                {field:"linkedin", icon:"💼", label:"LINKEDIN", placeholder:"linkedin.com/in/username"},
                {field:"portfolio", icon:"🌐", label:"PORTFOLIO / WEBSITE", placeholder:"yoursite.com"},
              ].map(l => (
                <div key={l.field} className="input-group">
                  <label className="label">{l.icon} {l.label}</label>
                  <input className="input" placeholder={l.placeholder} value={data[l.field]} onChange={e=>update(l.field,e.target.value)}/>
                </div>
              ))}
              <div className="input-group">
                <label className="label">PROFILE VISIBILITY</label>
                <select className="input" value={data.visibility} onChange={e=>update("visibility",e.target.value)}>
                  <option value="public">🌐 Public — anyone can see my profile</option>
                  <option value="private">🔒 Private — only matched users can see me</option>
                </select>
              </div>
            </div>
          </div>
        )}

        {/* Navigation */}
        {step > 0 && (
          <div style={{display:"flex",justifyContent:"space-between",marginTop:28}}>
            <button className="btn btn-ghost" onClick={() => setStep(s=>s-1)}>← Back</button>
            {step < 4 ? (
              <button className="btn btn-primary" onClick={() => setStep(s=>s+1)} disabled={!canProceed()}>
                Continue →
              </button>
            ) : (
              <button className="btn btn-accent2" onClick={handleSubmit}>
                🚀 Enter SuperNetworkAI
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Discover ─────────────────────────────────────────────────────────────────
function Discover({ profiles, currentUser, connections, setConnections, apiKey, setApiKey }) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [aiQuery, setAiQuery] = useState("");
  const [aiResults, setAiResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [showApiInput, setShowApiInput] = useState(false);
  const [localKey, setLocalKey] = useState(apiKey);

  const filters = ["all","cofounder","teammate","client"];

  const visibleProfiles = profiles.filter(p => {
    if (filter !== "all" && p.intent !== filter) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase()) &&
        !p.skills.join(" ").toLowerCase().includes(search.toLowerCase()) &&
        !p.role.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const runAiSearch = async () => {
    if (!aiQuery.trim()) return;
    if (!apiKey) { setShowApiInput(true); return; }
    setLoading(true); setAiResults(null);
    try {
      const prompt = `You are a networking AI. A user is searching for: "${aiQuery}"

Here are the available profiles:
${JSON.stringify(profiles.map(p => ({id:p.id,name:p.name,role:p.role,intent:p.intent,skills:p.skills,ikigai:p.ikigai,location:p.location})), null, 2)}

Return a JSON array of matches. For each match include:
- id (profile id)
- score (0-100, how well they match the query)  
- explanation (2 sentences explaining why they match, be specific about their Ikigai and skills)
- matchType (cofounder/teammate/client)

Sort by score descending. Only include profiles with score > 40. Return ONLY valid JSON array, no other text.`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content[0].text.replace(/```json|```/g,"").trim();
      const results = JSON.parse(text);
      setAiResults(results);
    } catch(e) {
      alert("AI search failed: " + e.message);
    } finally { setLoading(false); }
  };

  const displayProfiles = aiResults
    ? aiResults.map(r => ({ ...profiles.find(p=>p.id===r.id), aiScore:r.score, aiExplanation:r.explanation, aiMatchType:r.matchType })).filter(Boolean)
    : visibleProfiles;

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Discover People 🔭</div>
        <div className="page-sub">Browse and connect with builders, founders, and clients</div>
      </div>

      {/* AI Search */}
      <div className="card" style={{marginBottom:20,borderColor:"rgba(124,106,247,0.3)",background:"rgba(124,106,247,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontSize:20}}>✨</span>
          <div style={{fontWeight:700,fontFamily:"'Syne',sans-serif"}}>AI-Powered Search</div>
          <span className="tag tag-purple" style={{fontSize:11}}>Powered by Claude</span>
        </div>
        <div className="search-wrap" style={{marginBottom:0}}>
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder="e.g. 'technical cofounder who loves EdTech' or 'designer for a fintech startup'..."
            value={aiQuery} onChange={e=>setAiQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&runAiSearch()}/>
          <button className="search-btn" onClick={runAiSearch} disabled={loading}>
            {loading ? "Searching..." : "AI Search"}
          </button>
        </div>
        {showApiInput && !apiKey && (
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <input className="input" style={{flex:1}} type="password" placeholder="Enter your Anthropic API key (sk-ant-...)"
              value={localKey} onChange={e=>setLocalKey(e.target.value)}/>
            <button className="btn btn-primary btn-sm" onClick={()=>{setApiKey(localKey);setShowApiInput(false);}}>Save & Search</button>
          </div>
        )}
        {aiResults && (
          <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
            <span className="dot-online"></span>
            <span style={{fontSize:13,color:"var(--accent3)"}}>Found {aiResults.length} AI-matched profiles</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setAiResults(null);setAiQuery("");}}>Clear</button>
          </div>
        )}
      </div>

      {/* Filters & text search */}
      {!aiResults && (
        <>
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input className="search-input" placeholder="Search by name, role, or skill..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div className="filter-row">
            {filters.map(f => (
              <button key={f} className={`filter-btn${filter===f?" active":""}`} onClick={()=>setFilter(f)}>
                {f==="all"?"All People":f==="cofounder"?"🤝 Cofounders":f==="teammate"?"👥 Teammates":"💼 Clients"}
              </button>
            ))}
          </div>
        </>
      )}

      {/* Profile grid */}
      <div className="grid-3">
        {displayProfiles.map(p => (
          <ProfileCard key={p.id} profile={p} connections={connections} setConnections={setConnections} showAi={!!aiResults}/>
        ))}
      </div>
      {displayProfiles.length === 0 && (
        <div className="empty-state">
          <div className="empty-icon">🔭</div>
          <div className="empty-title">No matches found</div>
          <div className="empty-sub">Try adjusting your search or filters</div>
        </div>
      )}
    </div>
  );
}

// ─── AI Matches ───────────────────────────────────────────────────────────────
function Matches({ profiles, currentUser, connections, setConnections, apiKey, setApiKey }) {
  const [matches, setMatches] = useState(null);
  const [loading, setLoading] = useState(false);
  const [localKey, setLocalKey] = useState(apiKey);
  const [filter, setFilter] = useState("all");

  const generateMatches = async () => {
    const key = apiKey || localKey;
    if (!key) return;
    if (!apiKey) setApiKey(key);
    setLoading(true);
    try {
      const prompt = `You are an expert cofounder/teammate matchmaker.

Current user profile:
${JSON.stringify({name:currentUser.name,role:currentUser.role,intent:currentUser.intent,skills:currentUser.skills,ikigai:currentUser.ikigai,availability:currentUser.availability,workingStyle:currentUser.workingStyle}, null, 2)}

Available people to match with:
${JSON.stringify(profiles.map(p=>({id:p.id,name:p.name,role:p.role,intent:p.intent,skills:p.skills,ikigai:p.ikigai,availability:p.availability,workingStyle:p.workingStyle})),null,2)}

For each person, analyze:
1. Ikigai alignment - do their passions and missions complement each other?
2. Skill complementarity - do they fill each other's gaps?
3. Availability & working style compatibility
4. Intent alignment

Return a JSON array with ALL profiles, sorted by match score. Each item:
- id
- score (0-100)
- matchType (cofounder/teammate/client - best category for this pairing)
- headline (one punchy sentence about why they match)
- explanation (3 sentences: ikigai synergy, skill fit, working style notes)
- strengths (array of 2-3 specific synergy points)

Return ONLY valid JSON array, no markdown or extra text.`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:2000, messages:[{role:"user",content:prompt}] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content[0].text.replace(/```json|```/g,"").trim();
      setMatches(JSON.parse(text));
    } catch(e) {
      alert("Match generation failed: " + e.message);
    } finally { setLoading(false); }
  };

  const displayMatches = matches
    ? matches.map(m => ({ ...profiles.find(p=>p.id===m.id), ...m })).filter(p=>p.name)
        .filter(p => filter==="all" || p.matchType===filter)
    : [];

  return (
    <div>
      <div className="page-header">
        <div className="page-title">AI Matches ✨</div>
        <div className="page-sub">Claude analyzes your Ikigai to find your most aligned connections</div>

      {!matches && !loading && (
        <div className="card" style={{textAlign:"center",padding:48}}>
          <div style={{fontSize:56,marginBottom:16}}>🧠</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:700,marginBottom:8}}>
            Find Your Perfect Matches
          </div>
          <div style={{color:"var(--muted)",marginBottom:24,maxWidth:400,margin:"0 auto 24px"}}>
            Our AI reads your Ikigai profile and compares it against everyone in the network to find your most complementary matches.
          </div>
          {!apiKey && (
            <div style={{maxWidth:400,margin:"0 auto 16px",display:"flex",gap:8}}>
              <input className="input" type="password" placeholder="Anthropic API key (sk-ant-...)"
                value={localKey} onChange={e=>setLocalKey(e.target.value)}/>
            </div>
          )}
          <button className="btn btn-primary" onClick={generateMatches} disabled={!apiKey && !localKey}>
            ✨ Generate My Matches
          </button>
        </div>
      )}

      {loading && (
        <div className="card" style={{textAlign:"center",padding:64}}>
          <div style={{marginBottom:16}}><div className="spinner" style={{width:40,height:40,margin:"0 auto"}}></div></div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:600,marginBottom:8}} className="pulsing">Analyzing your Ikigai...</div>
          <div style={{color:"var(--muted)",fontSize:13}}>Claude is comparing your profile with {profiles.length} people in the network</div>
        </div>
      )}

      {matches && (
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div className="filter-row" style={{marginBottom:0}}>
              {["all","cofounder","teammate","client"].map(f => (
                <button key={f} className={`filter-btn${filter===f?" active":""}`} onClick={()=>setFilter(f)}>
                  {f==="all"?"All Matches":f==="cofounder"?"🤝 Cofounders":f==="teammate"?"👥 Teammates":"💼 Clients"}
                </button>
              ))}
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setMatches(null)}>Regenerate</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {displayMatches.map((p,i) => (
              <AIMatchCard key={p.id} profile={p} rank={i+1} connections={connections} setConnections={setConnections}/>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

          <div style={{marginTop:6}}>
            <span className={`tag ${intentColors[p.intent]||"tag-gray"}`} style={{fontSize:11}}>
              {p.intent==="cofounder"?"🤝 Cofounder":p.intent==="teammate"?"👥 Teammate":"💼 Client"}
            </span>
          </div>
        </div>
        {showAi && p.aiScore !== undefined && (
          <div className="match-score">
            <div className="match-score-num">{p.aiScore}</div>
            <div className="match-score-label">match</div>
          </div>
        )}
      </div>

      {showAi && p.aiExplanation && (
        <div className="match-ai-box">
          <div className="match-ai-label">✨ AI INSIGHT</div>
          {p.aiExplanation}
        </div>
      )}

      {!showAi && p.ikigaiStatement && (
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:12,lineHeight:1.6,fontStyle:"italic"}}>
          "{p.ikigaiStatement}"
        </div>
      )}

      <div className="match-tags">
        {p.skills.slice(0,4).map(s=><span key={s} className="tag tag-gray">{s}</span>)}
        {p.skills.length>4 && <span className="tag tag-gray">+{p.skills.length-4}</span>}
      </div>

      <div className="match-actions">
        {isConnected ? (
          <span className="tag tag-teal" style={{padding:"8px 14px"}}>✓ Connected</span>
        ) : (
          <button className="btn btn-primary btn-sm" onClick={()=>setConnections(c=>[...c,p.id])}>
            Connect
          </button>
        )}
        <button className="btn btn-secondary btn-sm">{p.availability}</button>
      </div>
    </div>
  );
}

// ─── AI Match Card (full width) ───────────────────────────────────────────────
function AIMatchCard({ profile: p, rank, connections, setConnections }) {
  const isConnected = connections.includes(p.id);
  const scoreColor = p.score >= 80 ? "var(--accent3)" : p.score >= 60 ? "var(--accent)" : "var(--accent2)";

  return (
    <div className="card fade-up" style={{display:"flex",gap:20,alignItems:"flex-start"}}>
      {/* Rank */}
      <div style={{flexShrink:0,textAlign:"center",width:40}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>#{rank}</div>
        <div style={{
          width:40,height:40,borderRadius:10,background:`rgba(77,240,192,0.1)`,
          border:`1px solid ${scoreColor}40`,display:"flex",alignItems:"center",justifyContent:"center",
          flexDirection:"column"
        }}>
          <div style={{fontSize:16,fontWeight:800,fontFamily:"'Syne',sans-serif",color:scoreColor,lineHeight:1}}>{p.score}</div>
        </div>
      </div>

      {/* Avatar */}
      <div className="avatar xl" style={{flexShrink:0}}>
        {p.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
      </div>

      {/* Content */}
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700}}>{p.name}</div>
          <span className="tag tag-purple" style={{fontSize:11}}>
            {p.matchType==="cofounder"?"🤝 Cofounder":p.matchType==="teammate"?"👥 Teammate":"💼 Client"}
          </span>
        </div>
        <div style={{color:"var(--muted)",fontSize:13,marginBottom:10}}>{p.role} · {p.location}</div>

        {p.headline && (
          <div style={{fontWeight:600,fontSize:14,color:"var(--text)",marginBottom:10}}>{p.headline}</div>
        )}

        <div className="match-ai-box" style={{marginBottom:10}}>
          <div className="match-ai-label">✨ MATCH ANALYSIS</div>
          {p.explanation}
        </div>

        {p.strengths && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {p.strengths.map((s,i)=>(
              <span key={i} className="tag tag-teal" style={{fontSize:11}}>✓ {s}</span>
            ))}
          </div>
        )}

        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          {p.skills.slice(0,5).map(s=><span key={s} className="tag tag-gray">{s}</span>)}
        </div>

        <div className="match-actions">
          {isConnected ? (
            <span className="tag tag-teal" style={{padding:"8px 14px"}}>✓ Connected</span>
          ) : (
            <button className="btn btn-primary btn-sm" onClick={()=>setConnections(c=>[...c,p.id])}>
              🤝 Connect
            </button>
          )}
          <button className="btn btn-secondary btn-sm">👤 View Profile</button>
          <span className="tag tag-gray">{p.availability}</span>
        </div>
      </div>
    </div>
  );
}

// ─── Messages ─────────────────────────────────────────────────────────────────
function Messages({ connections, profiles, messages, setMessages }) {
  const [activeId, setActiveId] = useState(connections[0] || null);
  const [input, setInput] = useState("");
  const chatRef = useRef(null);

  const connectedProfiles = connections.map(id => profiles.find(p=>p.id===id)).filter(Boolean);
  const activeProfile = profiles.find(p=>p.id===activeId);
  const chat = messages[activeId] || [];

  const sendMessage = () => {
    if (!input.trim() || !activeId) return;
    const newMsg = { id:Date.now(), from:"me", text:input.trim(), time:new Date().toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"}) };
    setMessages(m => ({...m, [activeId]:[...(m[activeId]||[]),newMsg]}));
    setInput("");
  };

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [chat]);

  if (connections.length === 0) {
    return (
      <div>
        <div className="page-header"><div className="page-title">Messages 💬</div></div>
        <div className="empty-state">
          <div className="empty-icon">💬</div>
          <div className="empty-title">No conversations yet</div>
          <div className="empty-sub">Connect with people in Discover to start chatting</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header"><div className="page-title">Messages 💬</div></div>
      <div className="msg-layout">
        <div className="msg-list">
          <div className="msg-list-header">Conversations</div>
          {connectedProfiles.map(p => (
            <div key={p.id} className={`msg-item${activeId===p.id?" active":""}`} onClick={()=>setActiveId(p.id)}>
              <div className="avatar sm">{p.name.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div className="msg-item-name">{p.name}</div>
                <div className="msg-item-preview">{(messages[p.id]||[]).slice(-1)[0]?.text || "No messages yet"}</div>
              </div>
              {p.id==="p1" && <div className="msg-unread"></div>}
            </div>
          ))}
        </div>
        <div className="chat-area">
          {activeProfile ? (
            <>
              <div className="chat-header">
                <div className="avatar">{activeProfile.name.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
                <div>
                  <div style={{fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{activeProfile.name}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{activeProfile.role} · {activeProfile.location}</div>
                </div>
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
                  <div className="dot-online"></div>
                  <span style={{fontSize:12,color:"var(--accent3)"}}>Online</span>
                </div>
              </div>
              <div className="chat-messages" ref={chatRef}>
                {chat.length === 0 && (
                  <div style={{textAlign:"center",padding:40,color:"var(--muted)",fontSize:13}}>
                    Start a conversation with {activeProfile.name} 👋
                  </div>
                )}
                {chat.map(msg => (
                  <div key={msg.id} className={`bubble ${msg.from==="me"?"me":"them"}`}>
                    {msg.text}
                    <div className="bubble-time">{msg.time}</div>
                  </div>
                ))}
              </div>
              <div className="chat-input-row">
                <input className="chat-input" placeholder={`Message ${activeProfile.name}...`}
                  value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&sendMessage()}/>
                <button className="btn btn-primary" onClick={sendMessage}>Send</button>
              </div>
            </>
          ) : (
            <div className="empty-state"><div className="empty-icon">💬</div><div className="empty-title">Select a conversation</div></div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Profile ──────────────────────────────────────────────────────────────────
function Profile({ user, setUser }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(user);
  const [skillInput, setSkillInput] = useState("");

  const save = () => { setUser(draft); setEditing(false); };

  const addSkill = () => {
    const s = skillInput.trim();
    if(s && !draft.skills.includes(s)) {
      setDraft(d=>({...d,skills:[...d.skills,s]}));
      setSkillInput("");
    }
  };

  if (!user) return null;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
        <div className="page-header" style={{marginBottom:0}}>
          <div className="page-title">My Profile 👤</div>
          <div className="page-sub">This is how others see you</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <span className={`tag ${user.visibility==="public"?"tag-teal":"tag-gray"}`}>
            {user.visibility==="public"?"🌐 Public":"🔒 Private"}
          </span>
          {!editing
            ? <button className="btn btn-secondary btn-sm" onClick={()=>setEditing(true)}>Edit Profile</button>
            : <>
                <button className="btn btn-primary btn-sm" onClick={save}>Save</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setDraft(user);setEditing(false);}}>Cancel</button>
              </>
          }
        </div>
      </div>

      <div className="profile-hero">
        <div className="avatar xl">{user.name.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
        <div className="profile-details">
          {editing ? (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input className="input" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="Name"/>
              <div className="grid-2">
                <input className="input" value={draft.location} onChange={e=>setDraft(d=>({...d,location:e.target.value}))} placeholder="Location"/>
                <select className="input" value={draft.intent} onChange={e=>setDraft(d=>({...d,intent:e.target.value}))}>
                  <option value="cofounder">Looking for Cofounder</option>
                  <option value="teammate">Looking for Teammate</option>
                  <option value="client">Looking for Client</option>
                </select>
              </div>
            </div>
          ) : (
            <>
              <div className="profile-name">{user.name}</div>
              <div className="profile-tagline">{user.role} · {user.location}</div>
              {user.ikigaiStatement && (
                <div style={{fontSize:14,color:"var(--muted)",fontStyle:"italic",marginBottom:14}}>"{user.ikigaiStatement}"</div>
              )}
              <div className="profile-links">
                {user.github && <span className="profile-link">🐙 {user.github}</span>}
                {user.linkedin && <span className="profile-link">💼 {user.linkedin}</span>}
                {user.portfolio && <span className="profile-link">🌐 {user.portfolio}</span>}
              </div>
            </>
          )}
        </div>
      </div>

      {/* Ikigai */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,marginBottom:16,fontSize:16}}>My Ikigai ✨</div>
        {editing ? (
          <div className="ikigai-grid">
            {[
              {key:"love",icon:"❤️",label:"WHAT I LOVE"},
              {key:"good",icon:"⭐",label:"WHAT I'M GOOD AT"},
              {key:"paid",icon:"💰",label:"CAN BE PAID FOR"},
              {key:"need",icon:"🌍",label:"WORLD NEEDS"},
            ].map(q=>(
              <div key={q.key} className="ikigai-card">
                <div className="ikigai-icon">{q.icon}</div>
                <div className="ikigai-label">{q.label}</div>
                <textarea className="input" style={{minHeight:70,fontSize:13}}
                  value={draft.ikigai[q.key]} onChange={e=>setDraft(d=>({...d,ikigai:{...d.ikigai,[q.key]:e.target.value}}))}/>
              </div>
            ))}
          </div>
        ) : (
          <div className="ikigai-display">
            {[
              {key:"love",icon:"❤️",label:"WHAT I LOVE",color:"#f76a6a"},
              {key:"good",icon:"⭐",label:"WHAT I'M GOOD AT",color:"var(--accent2)"},
              {key:"paid",icon:"💰",label:"CAN BE PAID FOR",color:"var(--accent3)"},
              {key:"need",icon:"🌍",label:"WORLD NEEDS",color:"var(--accent)"},
            ].map(q=>(
              <div key={q.key} className="ikigai-display-card">
                <div className="ikigai-display-label" style={{color:q.color}}>{q.icon} {q.label}</div>
                <div className="ikigai-display-text">{user.ikigai[q.key] || <span style={{color:"var(--muted)"}}>Not filled in</span>}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Skills */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,marginBottom:16,fontSize:16}}>Skills 🛠️</div>
        {editing ? (
          <>
            <div className="skill-input-row" style={{marginBottom:10}}>
              <input className="input" placeholder="Add a skill..." value={skillInput}
                onChange={e=>setSkillInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSkill()}/>
              <button className="btn btn-secondary" onClick={addSkill}>Add</button>
            </div>
            <div className="skills-wrap">
              {draft.skills.map(s=>(
                <span key={s} className="tag tag-purple" onClick={()=>setDraft(d=>({...d,skills:d.skills.filter(x=>x!==s)}))} style={{cursor:"pointer"}}>
                  {s} ✕
                </span>
              ))}
            </div>
          </>
        ) : (
          <div className="skills-wrap">
            {user.skills.length>0 ? user.skills.map(s=><span key={s} className="tag tag-purple">{s}</span>)
              : <span style={{color:"var(--muted)",fontSize:13}}>No skills added yet</span>}
          </div>
        )}
      </div>

      {/* Working style */}
      <div className="grid-2">
        <div className="stat-card">
          <div style={{fontSize:24,marginBottom:6}}>🕐</div>
          <div className="stat-num" style={{fontSize:18}}>{user.availability}</div>
          <div className="stat-label">Availability</div>
        </div>
        <div className="stat-card">
          <div style={{fontSize:24,marginBottom:6}}>🎯</div>
          <div className="stat-num" style={{fontSize:18}}>{user.workingStyle}</div>
          <div className="stat-label">Working Style</div>
        </div>
      </div>
    </div>
  );
}

// ─── Render ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
